{% extends 'base.html' %}

{% block content %}
<center>
<h2>Edit Flight</h2>

<form method="POST">

{% csrf_token %}

<input type="text" name="flight_number" value="{{ flight.flight_number }}"><br><br>

<input type="text" name="airline_name" value="{{ flight.airline_name }}"><br><br>

<input type="text" name="source" value="{{ flight.source }}"><br><br>

<input type="text" name="destination" value="{{ flight.destination }}"><br><br>

<input type="datetime-local" name="departure_time"><br><br>

<input type="datetime-local" name="arrival_time"><br><br>

<input type="number" name="price" value="{{ flight.price }}"><br><br>

<input type="number" name="seats" value="{{ flight.seats }}"><br><br>

<button type="submit">Update Flight</button>

</form>
</center>
<br>
{% endblock %}
